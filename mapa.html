<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="mapa.css" />
    <link rel="stylesheet" href="mapa-theme.css" />
    <link rel="stylesheet" href="mapa-modal.css" />

</head>
<body>

    <header class="mapa-header">
        <div>
            <h1>Mapa de Pontos de Coleta</h1>
           
        </div>


    </header>

    <div id="meu-mapa"></div>

    <!-- Modal de cadastro de ponto -->
    <div id="modal-cadastro" class="modal-overlay" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="cad-title">
            <div class="modal-top">
                <h2 id="cad-title">Cadastrar ponto</h2>
                <button type="button" id="cad-close" class="modal-close" aria-label="Fechar">✕</button>
            </div>

            <div class="modal-body">
                <div class="field">
                    <label for="cad-titulo">Nome do ponto</label>
                    <input id="cad-titulo" type="text" placeholder="Ex.: Ponto de coleta - Parque" />
                </div>

                

                <div class="field">
                    <label for="cad-descricao">Descrição (opcional)</label>
                    <textarea id="cad-descricao" rows="3" placeholder="Observações, referência, etc."></textarea>
                </div>

                <input id="cad-lat" type="hidden" />
                <input id="cad-lng" type="hidden" />

                <div class="modal-actions">
                    <button type="button" id="cad-cancel" class="btn btn-secondary">Cancelar</button>
                    <button type="button" id="cad-save" class="btn btn-primary">Salvar ponto</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Busca (geocoder) para pesquisar localizações no mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@1.13.0/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder@1.13.0/dist/Control.Geocoder.js"></script>
    
    <script src="mapa.js"></script>
</body>
</html>
